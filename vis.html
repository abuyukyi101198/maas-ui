<!DOCTYPE html>
<meta charset="utf-8" />
<html lang="en">
<head>
  <title>Code City Voronoi</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
      body {
          margin: 0;
          font-family: sans-serif;
          background: #111;
          color: #eee;
      }

      svg {
          width: 100vw;
          height: 100vh;
          display: block;
          background: #FEF1C7;
      }

      .cell {
          cursor: pointer;
          transition: stroke-width 0.2s, stroke 0.2s;
      }

      .cell.highlighted {
          stroke: #ffeb3b;
          stroke-width: 2.5px;
      }

      .tooltip {
          position: absolute;
          background: #222;
          color: #eee;
          padding: 10px 12px;
          border-radius: 6px;
          border: 1px solid #444;
          font-size: 13px;
          pointer-events: none;
          visibility: hidden;
          white-space: nowrap;
          box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
          max-width: 320px;
      }

      .tooltip-title {
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 6px;
      }

      .tooltip-field {
          font-size: 13px;
          margin-top: 2px;
          color: #ddd;
      }
  </style>
</head>
<body>
<svg></svg>
<div class="tooltip" id="tooltip"></div>
<script>
  const width = window.innerWidth;
  const height = window.innerHeight;
  const svg = d3.select("svg").attr("width", width).attr("height", height);
  const g = svg.append("g");
  const tooltip = d3.select("#tooltip");
  let selectedCell = null;

  d3.json("component-dependencies.json").then(data => {
    const nodesMap = new Map();
    const links = [];

    for (const [target, sources] of Object.entries(data)) {
      if (!nodesMap.has(target)) nodesMap.set(target, { id: target });
      if (Array.isArray(sources)) {
        sources.forEach(source => {
          if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
          links.push({ source, target });
        });
      } else if (sources && typeof sources === "object") {
        const deps = Array.isArray(sources.dependencies) ? sources.dependencies : [];
        deps.forEach(source => {
          if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
          links.push({ source, target });
        });
        if (typeof sources.loc === "number") {
          nodesMap.get(target).loc = sources.loc;
        }
      }
    }

    const barrenNodes = [];
    const barrenCount = 80;
    for (let i = 0; i < barrenCount; i++) {
      barrenNodes.push({
        id: "barren_" + i,
        x: Math.random() * width,
        y: Math.random() * height,
        barren: true,
        degree: 0,
        loc: 0,
      });
    }

    const nodes = Array.from(nodesMap.values());

    nodes.forEach(node => {
      node.degree = links.filter(l => l.source === node.id || l.target === node.id).length;
      node.x = width / 2 + (Math.random() - 0.5) * 50;
      node.y = height / 2 + (Math.random() - 0.5) * 50;
      if (node.loc === undefined && data[node.id] && typeof data[node.id] === "object" && typeof data[node.id].loc === "number") {
        node.loc = data[node.id].loc;
      }
    });

    const allNodes = [...nodes, ...barrenNodes];

    const maxDegree = d3.max(nodes, d => d.degree) || 1;
    const cityRadius = Math.min(width, height) / 4;
    const maxLoC = d3.max(nodes, d => d.loc || 1);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(200))
      .force("charge", d3.forceManyBody().strength(-1))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("radial", d3.forceRadial(
        d => {
          if (d.barren) return Math.min(width, height);
          const normalized = maxDegree ? d.degree / maxDegree : 0;
          const minRadius = 20;
          return minRadius + (1 - normalized) * cityRadius;
        },
        width / 2,
        height / 2,
      ))
      .force("collision", d3.forceCollide().radius(d => {
        const locWeight = (d.loc || 10) / maxLoC;
        return (10 + locWeight * 100) / 5;
      }));

    const categories = [
      "base", "controllers", "devices", "domains", "images", "intro", "kvm",
      "machines", "networkDiscovery", "pools", "preferences", "settings",
      "subnets", "tags", "zones",
    ];

    const palette = {
      base: "#DA916E",
      controllers: "#C1937C",
      devices: "#C1AB74",
      domains: "#D9A665",
      images: "#C1A17C",
      intro: "#869A81",
      kvm: "#7c7fc1",
      machines: "#c17c96",
      networkDiscovery: "#c1c07c",
      pools: "#83c17c",
      preferences: "#aac17c",
      settings: "#7cb1c1",
      subnets: "#5e5b84",
      tags: "#7f824b",
      zones: "#7f6b55",
      other: "#598680",
    };

    function getCategory(filePath) {
      const firstSegment = filePath.split("/")[0];
      return categories.includes(firstSegment) ? firstSegment : "other";
    }

    function getCategoryColor(filePath) {
      const category = getCategory(filePath);
      return palette[category] || "#999";
    }

    function updateVoronoi() {
      const delaunay = d3.Delaunay.from(allNodes, d => d.x, d => d.y);
      const voronoi = delaunay.voronoi([0, 0, width, height]);

      const cells = g.selectAll("path.cell")
        .data(nodes, d => d.id);

      cells.join("path")
        .attr("class", d => d === selectedCell ? "cell highlighted" : "cell")
        .attr("d", (d, i) => voronoi.renderCell(i))
        .attr("fill", d => getCategoryColor(d.id))
        .attr("stroke", "#FEF1C7")
        .attr("stroke-width", 2)
        .on("click", (event, d) => {
          if (selectedCell === d) {
            selectedCell = null;
            tooltip.style("visibility", "hidden");
          } else {
            selectedCell = d;
            showTooltip(event, d);
          }
          updateVoronoi();
          event.stopPropagation();
        });
    }

    function showTooltip(event, d) {
      const basename = d.id.split("/").pop().replace(/\.[tj]sx?$/, "");
      const degree = d.degree ?? 0;
      const loc = (d.loc !== undefined) ? d.loc : (data[d.id] && data[d.id].loc !== undefined ? data[d.id].loc : "N/A");

      tooltip.html(
        `<div class="tooltip-title">${escapeHtml(basename)}</div>
         <div class="tooltip-field">Degree: <strong>${escapeHtml(String(degree))}</strong></div>
         <div class="tooltip-field">LoC: <strong>${escapeHtml(String(loc))}</strong></div>`,
      ).style("visibility", "visible");

      requestAnimationFrame(() => {
        const padding = 10;
        const nodeRect = tooltip.node().getBoundingClientRect();
        let left = event.pageX + 12;
        let top = event.pageY + 12;

        if (left + nodeRect.width + padding > window.innerWidth) left = window.innerWidth - nodeRect.width - padding;
        if (top + nodeRect.height + padding > window.innerHeight) top = window.innerHeight - nodeRect.height - padding;
        if (left < padding) left = padding;
        if (top < padding) top = padding;

        tooltip.style("left", left + "px").style("top", top + "px");
      });
    }

    simulation.on("tick", () => {
      updateVoronoi();
    });

    svg.call(
      d3.zoom()
        .scaleExtent([1, 5])
        .on("zoom", (event) => {
          const t = event.transform;
          const k = t.k;
          const tx = Math.min(0, Math.max(width - width * k, t.x));
          const ty = Math.min(0, Math.max(height - height * k, t.y));
          g.attr("transform", `translate(${tx},${ty}) scale(${k})`);

          if (selectedCell) {
            selectedCell = null;
            tooltip.style("visibility", "hidden");
            updateVoronoi();
          }
        }),
    );

    svg.on("click", (event) => {
      if (event.target.tagName === "svg" && selectedCell) {
        selectedCell = null;
        tooltip.style("visibility", "hidden");
        updateVoronoi();
      }
    });
  });

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;",
    }[c]));
  }
</script>
</body>
</html>
