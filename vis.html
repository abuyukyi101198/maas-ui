<!DOCTYPE html>
<meta charset="utf-8" />
<html lang="en">
<head>
  <title>Code City Voronoi</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
      body {
          margin: 0;
          font-family: sans-serif;
          background: #111;
          color: #eee;
      }

      svg {
          width: 100vw;
          height: 100vh;
          display: block;
      }
  </style>
</head>
<body>
<svg></svg>
<script>
  const width = window.innerWidth;
  const height = window.innerHeight;
  const svg = d3.select("svg").attr("width", width).attr("height", height);
  const g = svg.append("g");

  d3.json("component-dependencies.json").then(data => {
    const nodesMap = new Map();
    const links = [];

    for (const [target, sources] of Object.entries(data)) {
      if (!nodesMap.has(target)) nodesMap.set(target, { id: target });
      sources.forEach(source => {
        if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
        links.push({ source, target });
      });
    }

    const nodes = Array.from(nodesMap.values());

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(20))
      .force("charge", d3.forceManyBody().strength(-5))
      .force("center", d3.forceCenter(width / 2, height / 2));

    const link = g.selectAll("line")
      .data(links)

    const node = g.selectAll("circle")
      .data(nodes)

    const label = g.selectAll("text")
      .data(nodes)

    function updateVoronoi() {
      const delaunay = d3.Delaunay.from(nodes, d => d.x, d => d.y);
      const voronoi = delaunay.voronoi([0, 0, width, height]);

      const cells = g.selectAll("path.cell")
        .data(nodes, d => d.id);

      cells.join("path")
        .attr("class", "cell")
        .attr("d", (d, i) => voronoi.renderCell(i))
        .attr("fill", (d, i) => d3.schemeTableau10[i % 10]);
    }

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      node
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);

      label
        .attr("x", d => d.x)
        .attr("y", d => d.y);

      updateVoronoi();
    });

    svg.call(
      d3.zoom()
        .scaleExtent([0.5, 5])
        .on("zoom", (event) => g.attr("transform", event.transform)),
    );
  });
</script>
</body>
</html>
