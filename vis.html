<!DOCTYPE html>
<meta charset="utf-8" />
<html lang="en">
<head>
  <title>Code City Voronoi</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
      body {
          margin: 0;
          font-family: sans-serif;
          background: #111;
          color: #eee;
      }

      svg {
          width: 100vw;
          height: 100vh;
          display: block;
      }

      .tooltip {
          position: absolute;
          background: #222;
          color: #eee;
          padding: 6px 10px;
          border-radius: 6px;
          border: 1px solid #444;
          font-size: 14px;
          pointer-events: none;
          visibility: hidden;
          white-space: nowrap;
          box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      }
  </style>
</head>
<body>
<svg></svg>
<div class="tooltip" id="tooltip"></div>
<script>
  const width = window.innerWidth;
  const height = window.innerHeight;
  const svg = d3.select("svg").attr("width", width).attr("height", height);
  const g = svg.append("g");
  const tooltip = d3.select("#tooltip");

  d3.json("component-dependencies.json").then(data => {
    const nodesMap = new Map();
    const links = [];

    for (const [target, sources] of Object.entries(data)) {
      if (!nodesMap.has(target)) nodesMap.set(target, { id: target });
      sources.forEach(source => {
        if (!nodesMap.has(source)) nodesMap.set(source, { id: source });
        links.push({ source, target });
      });
    }

    const nodes = Array.from(nodesMap.values());

    nodes.forEach(node => {
      node.degree = links.filter(l => l.source === node.id || l.target === node.id).length;
      node.x = width / 2 + (Math.random() - 0.5) * 50;
      node.y = height / 2 + (Math.random() - 0.5) * 50;
    });

    const maxDegree = d3.max(nodes, d => d.degree);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(20))
      .force("charge", d3.forceManyBody().strength(-10))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("radial", d3.forceRadial(
        d => {
          const normalized = maxDegree ? d.degree / maxDegree : 0;
          const minRadius = 50;
          const maxRadius = Math.min(width, height) / 2 - 50;
          return minRadius + (1 - normalized) * maxRadius;
        },
        width / 2,
        height / 2
      ));

    function updateVoronoi() {
      const delaunay = d3.Delaunay.from(nodes, d => d.x, d => d.y);
      const voronoi = delaunay.voronoi([0, 0, width, height]);

      const cells = g.selectAll("path.cell")
        .data(nodes, d => d.id);

      cells.join("path")
        .attr("class", "cell")
        .attr("d", (d, i) => voronoi.renderCell(i))
        .attr("fill", (d, i) => d3.schemeTableau10[i % 10])
        .attr("stroke", "#111")
        .attr("stroke-width", 0.5)
        .on("click", (event, d) => {
          tooltip
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY + 10) + "px")
            .style("visibility", "visible")
            .text(d.id + "\n" + d.degree);
        });
    }

    simulation.on("tick", () => {
      updateVoronoi();
    });

    svg.call(
      d3.zoom()
        .scaleExtent([1, 5])
        .on("zoom", (event) => {
          const t = event.transform;
          const k = t.k;

          const tx = Math.min(0, Math.max(width - width * k, t.x));
          const ty = Math.min(0, Math.max(height - height * k, t.y));

          g.attr("transform", `translate(${tx},${ty}) scale(${k})`);
        })
    );

    svg.on("click", (event) => {
      if (event.target.tagName === "svg") {
        tooltip.style("visibility", "hidden");
      }
    });
  });
</script>
</body>
</html>
